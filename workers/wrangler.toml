name = "asfdk-governance"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
GOVERNANCE_MODEL = "@cf/meta/llama-4-scout-17b-instruct-fp8"
ASFDK_VERSION = "ORG-DEV-OTOI-1.0.0"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "SESSION"
id = "REPLACE_WITH_KV_ID"

[[d1_databases]]
binding = "DB"
database_name = "asfdk-otoi"
database_id = "REPLACE_WITH_D1_ID"
